<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <!-- Back card (2 of BN-diamonds), rotated slightly left -->
  <g transform="rotate(-10, 70, 80)">
    <rect x="10" y="10" width="100" height="140" rx="8" fill="white" stroke="#bbb" stroke-width="1"/>
    <!-- Top-left 2 -->
    <text x="20" y="36" font-size="22" font-weight="bold" fill="#dc2626" font-family="Georgia, 'Times New Roman', serif">2</text>
    <!-- Center BN (upright) -->
    <text x="60" y="70" font-size="28" font-weight="800" fill="#dc2626" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">BN</text>
    <!-- Center BN (inverted) -->
    <g transform="rotate(180, 60, 95)">
      <text x="60" y="95" font-size="28" font-weight="800" fill="#dc2626" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">BN</text>
    </g>
    <!-- Bottom-right 2 (inverted) -->
    <g transform="rotate(180, 60, 80)">
      <text x="20" y="36" font-size="22" font-weight="bold" fill="#dc2626" font-family="Georgia, 'Times New Roman', serif">2</text>
    </g>
  </g>
  <!-- Front card (2 of BN-hearts), rotated slightly right -->
  <g transform="rotate(8, 120, 80)">
    <rect x="80" y="5" width="100" height="140" rx="8" fill="white" stroke="#bbb" stroke-width="1"/>
    <!-- Top-left 2 -->
    <text x="90" y="31" font-size="22" font-weight="bold" fill="#dc2626" font-family="Georgia, 'Times New Roman', serif">2</text>
    <!-- Center BN (upright) -->
    <text x="130" y="65" font-size="28" font-weight="800" fill="#dc2626" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">BN</text>
    <!-- Center BN (inverted) -->
    <g transform="rotate(180, 130, 90)">
      <text x="130" y="90" font-size="28" font-weight="800" fill="#dc2626" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">BN</text>
    </g>
    <!-- Bottom-right 2 (inverted) -->
    <g transform="rotate(180, 130, 75)">
      <text x="90" y="31" font-size="22" font-weight="bold" fill="#dc2626" font-family="Georgia, 'Times New Roman', serif">2</text>
    </g>
  </g>
</svg>
